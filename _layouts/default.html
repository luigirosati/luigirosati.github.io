<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header>
    <h1><a href="/">luigi rosati</a></h1>
    {% unless page.url == '/' %}
    <nav>
      <a href="/">home</a>
      <a href="/research"{% if page.url contains 'research' %} class="active"{% endif %}>research</a>
      <a href="/teaching"{% if page.url contains 'teaching' %} class="active"{% endif %}>teaching</a>
      <a href="/music"{% if page.url contains 'music' %} class="active"{% endif %}>music</a>
      <a href="/files/cv.pdf" target="_blank" rel="noopener">cv</a>

    </nav>
    {% endunless %}
  </header>

  <main>
    {{ content }}
  </main>

  <footer></footer>
</body>
</html>
